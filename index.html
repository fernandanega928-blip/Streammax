<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamMax 🎬</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-image: linear-gradient(rgba(11, 27, 54, 0.85), rgba(11, 27, 54, 0.95)), url('fundo.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #0b1b36;
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 35px;
            padding-top: 20px;
        }

        h1 {
            color: #dfb15b;
            margin-bottom: 20px;
            font-size: 2.8rem;
            text-shadow: 0px 4px 10px rgba(0, 0, 0, 0.7);
            font-weight: 800;
            letter-spacing: 1px;
        }

        .search-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        input {
            width: 100%;
            padding: 14px 22px;
            background-color: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(223, 177, 91, 0.4);
            border-radius: 25px;
            color: #fff;
            font-size: 16px;
            outline: none;
            backdrop-filter: blur(5px);
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        input:focus {
            border-color: #dfb15b;
            background-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 20px rgba(223, 177, 91, 0.3);
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 0;
        }

        .movie-card {
            background-color: rgba(15, 34, 64, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            cursor: pointer;
        }

        .movie-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(223, 177, 91, 0.2);
            border-color: rgba(223, 177, 91, 0.5);
        }

        .movie-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .movie-info {
            padding: 14px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-grow: 1;
        }

        .movie-info h3 {
            font-size: 14px;
            margin-bottom: 10px;
            color: #f3f4f6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.3;
        }

        .rating {
            color: #dfb15b;
            font-size: 13px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* ESTILOS DA JANELA DO PLAYER (MODAL) */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            width: 90%;
            max-width: 800px;
            background-color: #0b1b36;
            border: 2px solid #dfb15b;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            color: #fff;
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1001;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .close-btn:hover {
            color: #dfb15b;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* Proporção 16:9 */
            height: 0;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>STREAMMAX 🎬</h1>
        <div class="search-container">
            <input type="text" id="search" placeholder="Buscar filmes...">
        </div>
    </header>

    <main class="movies-grid" id="movies-grid">
        </main>

    <div id="videoModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeModal">&times;</span>
            <div class="video-container">
                <iframe id="videoPlayer" src="" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script>
        // API KEY DO TMDB JÁ INSERIDA
        const API_KEY = 'ec17ab8ea3020aec3e0bd756453c23fc'; 
        
        const API_URL = `https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}&language=pt-BR`;
        const SEARCH_URL = `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&language=pt-BR&query=`;

        const moviesGrid = document.getElementById('movies-grid');
        const searchInput = document.getElementById('search');
        const videoModal = document.getElementById('videoModal');
        const videoPlayer = document.getElementById('videoPlayer');
        const closeModal = document.getElementById('closeModal');

        async function getMovies(url) {
            try {
                const res = await fetch(url);
                const data = await res.json();
                showMovies(data.results);
            } catch (error) {
                console.error("Erro ao buscar filmes:", error);
            }
        }

        function showMovies(movies) {
            moviesGrid.innerHTML = '';

            if(!movies || movies.length === 0) {
                moviesGrid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: #aaa; padding-top: 40px;">Nenhum filme encontrado.</p>`;
                return;
            }

            movies.forEach((movie) => {
                const { title, poster_path, vote_average, id } = movie;

                const movieEl = document.createElement('div');
                movieEl.classList.add('movie-card');
                
                // Evento de clique para abrir o player com o ID do filme
                movieEl.addEventListener('click', () => openPlayer(id));

                const posterUri = poster_path 
                    ? `https://image.tmdb.org/t/p/w500${poster_path}` 
                    : 'https://via.placeholder.com/500x750.png?text=Sem+Foto';

                movieEl.innerHTML = `
                    <img src="${posterUri}" alt="${title}">
                    <div class="movie-info">
                        <h3>${title}</h3>
                        <span class="rating">⭐ ${vote_average.toFixed(1)}</span>
                    </div>
                `;
                moviesGrid.appendChild(movieEl);
            });
        }

        // Função que abre a janela do player de vídeo usando o embed.su
        function openPlayer(movieId) {
            const embedUrl = `https://embed.su/embed/movie/${movieId}`;
            videoPlayer.src = embedUrl;
            videoModal.style.display = 'flex';
        }

        // Fecha o player e limpa a URL para o vídeo parar de rodar no fundo
        closeModal.addEventListener('click', () => {
            videoModal.style.display = 'none';
            videoPlayer.src = '';
        });

        // Fecha o modal se clicar na área escura de fora
        window.addEventListener('click', (e) => {
            if (e.target === videoModal) {
                videoModal.style.display = 'none';
                videoPlayer.src = '';
            }
        });

        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value;

            if(searchTerm && searchTerm.trim() !== '') {
                getMovies(SEARCH_URL + encodeURIComponent(searchTerm));
            } else {
                getMovies(API_URL);
            }
        });

        getMovies(API_URL);
    </script>
</body>
</html>
